/**:
  ros__parameters:
    cmd_vel_timeout: 0.3

    control:
      period: 0.02
      max_dt: 0.05

    leg_odometry:
      enabled: true
      topic: leg_odom
      frame_id: odom
      child_frame_id: base_link
      use_joint_states: true
      joint_states_topic: joint_states
      min_support_legs: 3
      max_fit_residual: 0.03
      max_linear_delta: 0.03
      max_angular_delta: 0.25
      translation_scale: 1.0
      propagate_on_invalid_update: false
      max_prediction_time: 0.08
      reset_pose_on_control_reset: true

    gait:
      # Tripod gait foot travel relative to each neutral foot position.
      step_limit_x: 0.045
      step_limit_y: 0.035
      foot_z_down: -0.100
      foot_z_up: -0.070
      foot_z_sync: -0.090

      # Stance-foot speed limits used to scale requested body velocity.
      max_velocity_ratio: 0.50
      stance_velocity_x: 0.67
      stance_velocity_y: 0.34
      vertical_velocity: 0.2266666667

      # Swing and idle recovery speeds.
      swing_xy_velocity: 0.55
      idle_return_velocity: 0.25
      velocity_epsilon: 0.00001

    ik:
      position_weight: 1.0
      orientation_weight: 0.0
      seed_joint_angles_left: [0.0, 0.6, 1.8]
      seed_joint_angles_right: [0.0, -0.6, -1.8]

    heading_hold:
      enabled: true
      # Heading hold uses the controller's own leg odometry by default.
      # Do not point this at simulator /odom unless you explicitly want that behavior.
      odom_topic: "leg_odom"
      kp: 1.8
      kd: 0.30
      max_angular_velocity: 0.40
      min_linear_velocity: 0.02
      angular_deadband: 0.02

    command_filter:
      max_linear_acceleration: 0.8
      max_angular_acceleration: 2.0

    body_pose:
      max_x: 0.030
      max_y: 0.025
      max_z: 0.020
      max_roll: 0.18
      max_pitch: 0.18
      max_yaw: 0.22
      linear_rate: 0.10
      angular_rate: 0.70
